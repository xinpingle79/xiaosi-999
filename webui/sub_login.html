<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>子账户登录</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="login-body">
    <div class="login-shell">
      <div class="login-card">
        <div class="login-title">子账户登录</div>
        <div class="login-subtitle">请输入子账户账号</div>
        <div class="login-field">
          <label>用户名</label>
          <input id="login-username" type="text" autocomplete="username" />
        </div>
        <div class="login-field">
          <label>密码</label>
          <input id="login-password" type="password" autocomplete="current-password" />
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button id="login-submit" class="primary login-submit">登录</button>
      </div>
    </div>
    <script>
      const submit = document.getElementById("login-submit");
      const username = document.getElementById("login-username");
      const password = document.getElementById("login-password");
      const errorBox = document.getElementById("login-error");
      const ERROR_I18N = {
        unauthorized: "未授权，请重新登录",
        invalid_token: "登录状态已失效，请重新登录",
        token_expired: "登录状态已过期，请重新登录",
        account_disabled: "账号已禁用",
        account_expired: "账号已到期，请联系管理员续费",
        password_error: "密码错误",
      };
      function translateErrorMessage(value) {
        if (value === null || value === undefined) return "";
        const text = String(value).trim();
        if (!text) return "";
        if (/[\u4e00-\u9fa5]/.test(text)) return text;
        return ERROR_I18N[text] || text;
      }

      async function doLogin() {
        errorBox.classList.add("hidden");
        const payload = {
          username: username.value.trim(),
          password: password.value.trim(),
        };
        const res = await fetch("/api/sub/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errorBox.textContent = translateErrorMessage(data.error) || "登录失败";
          errorBox.classList.remove("hidden");
          return;
        }
        window.location.href = "/sub";
      }

      submit.addEventListener("click", doLogin);
      password.addEventListener("keydown", (event) => {
        if (event.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
