name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PYINSTALLER_VERSION: "6.10.0"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Build Directories
        shell: pwsh
        run: |
          Remove-Item build, dist, Output -Recurse -Force -ErrorAction SilentlyContinue

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller==${env:PYINSTALLER_VERSION}

      - name: Print Build Toolchain
        shell: pwsh
        run: |
          python --version
          python -m PyInstaller --version

      - name: Preflight Source Tree
        shell: pwsh
        run: |
          python tools/release_preflight.py

      - name: Windows Console Smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows-console-audit | Out-Null
          python tools/windows_console_smoke.py *>&1 | Tee-Object -FilePath dist/windows-console-audit/windows_console_smoke.txt

      - name: Build Main
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --hide-console hide-early --name FB_RPA_Main main.py --collect-all playwright --collect-submodules core --collect-submodules utils --hidden-import playwright.sync_api --hidden-import playwright.async_api

      - name: Build Worker
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --hide-console hide-early --name FB_RPA_Worker agent/worker.py --collect-all playwright --collect-submodules core --collect-submodules utils --hidden-import playwright.sync_api --hidden-import playwright.async_api

      - name: Build Client
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name FB_RPA_Client --icon assets/fb_chat_helper.ico client_app.py

      - name: Stage Client Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/FB_RPA_Client/config | Out-Null
          Copy-Item dist/FB_RPA_Client.exe dist/FB_RPA_Client/
          Copy-Item dist/FB_RPA_Worker.exe dist/FB_RPA_Client/
          Copy-Item dist/FB_RPA_Main.exe dist/FB_RPA_Client/
          Copy-Item config/messages.yaml dist/FB_RPA_Client/config/
          Copy-Item config/client.example.yaml dist/FB_RPA_Client/config/

      - name: Preflight Staged Package
        shell: pwsh
        run: |
          python tools/release_preflight.py

      - name: Windows Visual Audit
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tools/windows_visual_audit.ps1 -PackageRoot dist/FB_RPA_Client -OutputDir dist/windows-visual-audit

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss

      - name: Preflight Final Outputs
        shell: pwsh
        run: |
          python tools/release_preflight.py

      - name: Upload Client Folder
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_dist
          path: dist/FB_RPA_Client

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_Installer
          path: Output/*

      - name: Upload Windows Visual Audit
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_Windows_Visual_Audit
          path: dist/windows-visual-audit/*

      - name: Upload Windows Console Audit
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_Windows_Console_Audit
          path: dist/windows-console-audit/*
