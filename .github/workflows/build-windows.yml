name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Main
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name FB_RPA_Main main.py --collect-all playwright --collect-submodules core --collect-submodules utils --hidden-import playwright.sync_api --hidden-import playwright.async_api

      - name: Build Worker
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name FB_RPA_Worker agent/worker.py --collect-all playwright --collect-submodules core --collect-submodules utils --hidden-import playwright.sync_api --hidden-import playwright.async_api

      - name: Build Client
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name FB_RPA_Client --icon assets/fb_chat_helper.ico client_app.py

      - name: Build Desktop Alert
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name FB_Group_RPA_Alert desktop_alert.py

      - name: Stage Client Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/FB_RPA_Client/config | Out-Null
          Copy-Item dist/FB_RPA_Client.exe dist/FB_RPA_Client/
          Copy-Item dist/FB_RPA_Worker.exe dist/FB_RPA_Client/
          Copy-Item dist/FB_RPA_Main.exe dist/FB_RPA_Client/
          Copy-Item dist/FB_Group_RPA_Alert.exe dist/FB_RPA_Client/
          Copy-Item config/messages.yaml dist/FB_RPA_Client/config/
          Copy-Item config/client.example.yaml dist/FB_RPA_Client/config/

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss

      - name: Upload Client Folder
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_dist
          path: dist/FB_RPA_Client

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FB_RPA_Client_Installer
          path: Output/*
